services:
  db:
    image: mysql:8.0
    container_name: snazzy_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: snazzy_db
      MYSQL_USER: oscar_dev
      MYSQL_PASSWORD: dev_password
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  wordpress:
    build: .
    container_name: snazzy_wp
    depends_on:
      - db
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: oscar_dev
      WORDPRESS_DB_PASSWORD: dev_password
      WORDPRESS_DB_NAME: snazzy_db
    volumes:
      - ./src:/var/www/html

volumes:
  db_data:
